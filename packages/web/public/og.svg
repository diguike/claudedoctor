<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#173128" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#07100C"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.62"/>
  <rect width="1200" height="7" fill="#31E6AC"/>
  <path d="M708 7V630" stroke="#173128" stroke-width="1"/>

  <g transform="translate(76 66)">
    <circle cx="17" cy="12" r="15" fill="none" stroke="#31E6AC" stroke-width="3"/>
    <path d="M17 27v10a20 20 0 0 0 40 0v-8" fill="none" stroke="#31E6AC" stroke-width="3"/>
    <circle cx="57" cy="27" r="6" fill="#07100C" stroke="#31E6AC" stroke-width="3"/>
    <text x="84" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="30" font-weight="700" fill="#F2F7F4">claudedoctor<tspan fill="#31E6AC">.</tspan></text>
  </g>

  <text x="76" y="202" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#31E6AC">CLAUDE CODE 环境体检</text>
  <text x="76" y="290" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="66" font-weight="800" fill="#F2F7F4">先看证据，</text>
  <text x="76" y="370" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="66" font-weight="800" fill="#31E6AC">再处理风险。</text>
  <text x="76" y="432" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="27" fill="#9AAFA5">政策风险 · 访问问题 · 环境信息，分开判断</text>

  <g font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">
    <rect x="76" y="478" width="126" height="42" rx="6" fill="#10251D" stroke="#285342"/>
    <circle cx="96" cy="499" r="5" fill="#31E6AC"/>
    <text x="111" y="506" fill="#D8E6DF">证据优先</text>
    <rect x="216" y="478" width="126" height="42" rx="6" fill="#241E0D" stroke="#5E4912"/>
    <circle cx="236" cy="499" r="5" fill="#F5B82E"/>
    <text x="251" y="506" fill="#E8DDC2">可复检修复</text>
    <rect x="356" y="478" width="126" height="42" rx="6" fill="#0E2028" stroke="#23495A"/>
    <circle cx="376" cy="499" r="5" fill="#45A8D8"/>
    <text x="391" y="506" fill="#D1E3EA">开源透明</text>
  </g>

  <text x="76" y="578" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21" fill="#82958C">npm i -g @diguike/claudedoctor</text>

  <g transform="translate(760 82)">
    <rect width="366" height="466" rx="8" fill="#0D1713" stroke="#2A3A33"/>
    <text x="28" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#8CA097">LIVE DIAGNOSTIC</text>
    <circle cx="334" cy="39" r="5" fill="#31E6AC"/>
    <path d="M28 68H338" stroke="#24352E"/>

    <text x="28" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="42" font-weight="800" fill="#F5B82E">ATTENTION</text>
    <text x="28" y="151" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#9AAFA5">结论按证据等级解释，不输出封禁概率</text>

    <g font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
      <path d="M28 188H338" stroke="#24352E"/>
      <circle cx="37" cy="222" r="7" fill="#31E6AC"/>
      <text x="58" y="218" font-size="18" font-weight="700" fill="#ECF3EF">政策风险</text>
      <text x="58" y="244" font-size="16" fill="#8CA097">凭证与端点按真实优先级判断</text>
      <text x="310" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#31E6AC">OK</text>

      <path d="M28 270H338" stroke="#24352E"/>
      <circle cx="37" cy="304" r="7" fill="#F5B82E"/>
      <text x="58" y="300" font-size="18" font-weight="700" fill="#ECF3EF">访问 / 信誉</text>
      <text x="58" y="326" font-size="16" fill="#8CA097">地区、IP 类型与双栈路径</text>
      <text x="276" y="312" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#F5B82E">CHECK</text>

      <path d="M28 352H338" stroke="#24352E"/>
      <circle cx="37" cy="386" r="7" fill="#45A8D8"/>
      <text x="58" y="382" font-size="18" font-weight="700" fill="#ECF3EF">环境信息</text>
      <text x="58" y="408" font-size="16" fill="#8CA097">检测范围和局限写进结果</text>
      <text x="286" y="394" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#45A8D8">INFO</text>
    </g>

    <rect x="28" y="430" width="310" height="1" fill="#24352E"/>
    <text x="28" y="454" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#71847B">check → fix → verify</text>
  </g>
</svg>
